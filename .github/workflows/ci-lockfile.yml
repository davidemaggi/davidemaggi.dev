name: CI Lockfile Check

on:
  push:
  pull_request:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm i -g npm@10.9.4

      - name: Verify lockfile with npm ci
        run: npm ci

