server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Vite emits fingerprinted bundles in /assets, safe for long-term immutable caching.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Always revalidate HTML entrypoint and any non-fingerprinted static file.
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  location / {
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
