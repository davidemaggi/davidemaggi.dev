<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Purple abstract wallpaper inspired by Ubuntu style">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d0b4e"/>
      <stop offset="45%" stop-color="#5b1e8b"/>
      <stop offset="100%" stop-color="#e95420"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.75" r="0.6">
      <stop offset="0%" stop-color="#ffd9c7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd9c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>

  <g fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2">
    <circle cx="420" cy="280" r="230"/>
    <circle cx="420" cy="280" r="300"/>
    <circle cx="1500" cy="860" r="260"/>
    <circle cx="1500" cy="860" r="340"/>
  </g>
</svg>

